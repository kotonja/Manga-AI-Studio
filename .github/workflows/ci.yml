name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: manga
          POSTGRES_PASSWORD: manga
          POSTGRES_DB: manga_ai_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U manga -d manga_ai_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e "services/api[test]"
      - name: Run Alembic migrations from empty database
        working-directory: services/api
        env:
          DATABASE_URL: postgresql+psycopg://manga:manga@localhost:5432/manga_ai_ci
        run: alembic upgrade head
      - name: Backend tests
        env:
          DATABASE_URL: sqlite://
          ENABLE_BACKGROUND_JOBS: "false"
          APP_ENV: test
        run: pytest -q services/api/tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Enable Corepack
        run: corepack enable
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Type check web
        run: pnpm --filter @manga-ai/web typecheck
      - name: Build web
        run: pnpm --filter @manga-ai/web build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f services/api/Dockerfile --target production -t manga-ai-api:ci .
      - name: Build worker image
        run: docker build -f services/worker/Dockerfile --target production -t manga-ai-worker:ci .
      - name: Build web image
        run: docker build -f apps/web/Dockerfile --target runner -t manga-ai-web:ci .
