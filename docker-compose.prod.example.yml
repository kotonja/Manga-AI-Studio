# Production deployment example.
# Copy to docker-compose.prod.yml, create a real .env.prod, and review docs/DEPLOYMENT.md.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Replace with managed S3/R2/GCS-compatible object storage in serious production.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
    volumes:
      - minio-data:/data

  migrate:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      target: production
    env_file: ${ENV_FILE:-.env.prod}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      target: production
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.prod}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
      target: production
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.prod}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?set NEXT_PUBLIC_API_BASE_URL}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
      NEXT_PUBLIC_ENABLE_DEV_ADMIN: "false"
      ALPHA_AUTH_ENABLED: ${ALPHA_AUTH_ENABLED:-true}
      ALPHA_SHARED_PASSWORD: ${ALPHA_SHARED_PASSWORD:-}
      ALPHA_USER_TOKENS: ${ALPHA_USER_TOKENS:-}
      ALPHA_ADMIN_TOKEN: ${ALPHA_ADMIN_TOKEN:-}
      ALPHA_SESSION_SECRET: ${ALPHA_SESSION_SECRET:?set ALPHA_SESSION_SECRET}
    depends_on:
      - api
    expose:
      - "3000"

  # Put Caddy, Nginx, Traefik, or your platform load balancer in front of web/api.
  # Terminate TLS at the reverse proxy and forward X-Forwarded-* headers.

volumes:
  postgres-data:
  redis-data:
  minio-data:
